name: Deploy PHSH111 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/chapter1-mvp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/chapter1-mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Add Pages entry points for client-side routing
        run: |
          cp dist/index.html dist/404.html
          for route in \
            chapter/1 \
            chapter/1/topic/ch01-t01 \
            chapter/1/topic/ch01-t02 \
            chapter/1/topic/ch01-t03 \
            chapter/1/topic/ch01-t04 \
            chapter/1/topic/ch01-t08 \
            chapter/1/topic/ch01-t10
          do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/chapter1-mvp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
