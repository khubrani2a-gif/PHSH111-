<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" width="1000" height="760" role="img" aria-labelledby="ch01t04visTitle ch01t04visDesc">
  <title id="ch01t04visTitle">Mass, Gravitational Weight, and Apparent Weight (الكتلة والوزن الجذبي والوزن الظاهري)</title>
  <desc id="ch01t04visDesc">An original schematic with three side-by-side panels showing the same original equipment cart in three different actions. In the first panel, the cart is pushed horizontally, revealing its mass (inertia) — its resistance to a change in motion. In the second panel, the cart is being lifted straight up, revealing its gravitational weight, the downward force of gravity on it, following W = mg. In the third panel, the cart rests on a schematic scale, revealing its apparent weight — the support force the scale reads — with an explicit note that apparent weight equals gravitational weight only when the object is at rest, not automatically in general. A legend explains that the brick-red arrows represent forces (push, weight, support) and that teal represents structural elements (the object and the scale). A central equation panel restates W = mg with its units. Two captions state that apparent weight is this project's own clarifying term for a real, measurable support-force reading, not a direct quotation from any source, and that mass measures inertia and does not depend on location while gravitational weight is a force that does depend on location. Captions are provided in English and Arabic throughout.</desc>

  <defs>
    <marker id="arrowForceT04" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="760" fill="#ffffff"/>

  <!-- Title (bilingual) -->
  <text x="500" y="38" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Mass, Gravitational Weight, and Apparent Weight</text>
  <text x="500" y="64" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">الكتلة والوزن الجذبي والوزن الظاهري</text>

  <!-- Panel dividers -->
  <line x1="345" y1="90" x2="345" y2="390" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="655" y1="90" x2="655" y2="390" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Panel 1: Push -> reveals mass (inertia). cx=190 -->
  <text x="190" y="106" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Push</text>
  <text x="190" y="124" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">دفع</text>

  <!-- Cart 1 (original schematic: body + two wheels) -->
  <rect x="145" y="150" width="90" height="40" rx="6" fill="#ffffff" stroke="#1f6f8b" stroke-width="2.5"/>
  <circle cx="160" cy="200" r="12" fill="#1f6f8b"/>
  <circle cx="220" cy="200" r="12" fill="#1f6f8b"/>

  <!-- Push force arrow (brick-red), horizontal, into the cart's left side -->
  <line x1="80" y1="170" x2="140" y2="170" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrowForceT04)"/>
  <text x="80" y="152" text-anchor="start" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#334155">Push (Force)</text>
  <text x="80" y="225" text-anchor="start" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="12" fill="#334155">دفع (قوة)</text>

  <text x="190" y="260" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#334155">Push tests mass</text>
  <text x="190" y="278" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" fill="#334155">الدفع يختبر الكتلة</text>
  <text x="190" y="305" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Reveals: Mass (Inertia)</text>
  <text x="190" y="323" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">يكشف: الكتلة (قصور ذاتي)</text>

  <!-- Panel 2: Lift -> reveals gravitational weight. cx=500 -->
  <text x="500" y="106" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Lift</text>
  <text x="500" y="124" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">رفع</text>

  <!-- Cart 2 -->
  <rect x="455" y="150" width="90" height="40" rx="6" fill="#ffffff" stroke="#1f6f8b" stroke-width="2.5"/>
  <circle cx="470" cy="200" r="12" fill="#1f6f8b"/>
  <circle cx="530" cy="200" r="12" fill="#1f6f8b"/>

  <!-- Weight force arrow (brick-red), downward from cart center -->
  <line x1="500" y1="190" x2="500" y2="230" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrowForceT04)"/>
  <text x="510" y="225" text-anchor="start" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a"><tspan font-style="italic">W</tspan><tspan> = </tspan><tspan font-style="italic">mg</tspan></text>

  <text x="500" y="260" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#334155">Lifting reveals weight</text>
  <text x="500" y="278" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" fill="#334155">الرفع يكشف الوزن</text>
  <text x="500" y="305" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Reveals: Gravitational Weight</text>
  <text x="500" y="323" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">يكشف: الوزن الجذبي</text>

  <!-- Panel 3: Scale -> reveals apparent weight. cx=810 -->
  <text x="810" y="106" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Scale</text>
  <text x="810" y="124" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">ميزان</text>

  <!-- Cart 3 -->
  <rect x="765" y="150" width="90" height="40" rx="6" fill="#ffffff" stroke="#1f6f8b" stroke-width="2.5"/>
  <circle cx="780" cy="200" r="12" fill="#1f6f8b"/>
  <circle cx="840" cy="200" r="12" fill="#1f6f8b"/>

  <!-- Schematic scale platform (original, not a real-scale photo/icon) -->
  <rect x="750" y="212" width="120" height="24" rx="4" fill="#ffffff" stroke="#1f6f8b" stroke-width="2.5"/>
  <circle cx="810" cy="224" r="7" fill="none" stroke="#1f6f8b" stroke-width="1.5"/>
  <line x1="810" y1="224" x2="814" y2="219" stroke="#1f6f8b" stroke-width="1.5"/>

  <!-- Support-force arrow (brick-red), upward from scale into cart -->
  <line x1="810" y1="212" x2="810" y2="195" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrowForceT04)"/>

  <text x="810" y="260" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#334155">Scale shows apparent weight</text>
  <text x="810" y="278" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" fill="#334155">يُظهر الميزان الوزن الظاهري</text>
  <text x="810" y="305" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">Reveals: Apparent Weight</text>
  <text x="810" y="323" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f172a">يكشف: الوزن الظاهري</text>
  <text x="810" y="345" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-style="italic" fill="#334155">= gravitational weight at rest only</text>
  <text x="810" y="363" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="11" fill="#334155">= الوزن الجذبي عند السكون فقط</text>

  <!-- Legend: color key for force vs. structure -->
  <line x1="330" y1="410" x2="365" y2="410" stroke="#b91c1c" stroke-width="3" marker-end="url(#arrowForceT04)"/>
  <text x="372" y="414" text-anchor="start" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#334155">Force (push, weight, support)</text>
  <rect x="620" y="402" width="18" height="14" fill="#1f6f8b"/>
  <text x="644" y="414" text-anchor="start" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#334155">Structure (object, scale)</text>
  <text x="500" y="434" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="12" fill="#334155">قوة — دفع/وزن/دعم&#160;&#160;&#160;&#160;&#160;هيكل — الجسم والميزان</text>

  <!-- Key equation panel -->
  <rect x="354" y="454" width="300" height="105" fill="#1f6f8b" fill-opacity="0.16"/>
  <rect x="350" y="450" width="300" height="105" rx="12" fill="#eaf6f8" stroke="#1f6f8b" stroke-width="3"/>
  <text x="500" y="497" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a"><tspan font-style="italic">W</tspan><tspan> = </tspan><tspan font-style="italic">mg</tspan></text>
  <text x="500" y="524" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#334155">W = weight (N), m = mass (kg), g &#8776; 9.8 m/s&#178;</text>
  <text x="500" y="542" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="12" fill="#334155">W = الوزن (N)، m = الكتلة (kg)، g &#8776; 9.8 m/s&#178;</text>

  <!-- Caption 1: apparent-weight qualification (echoes ch01-corr-002's recorded qualification) -->
  <text x="500" y="595" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-style="italic" fill="#334155">Apparent weight is this project's own term — a real support-force reading, not always equal to gravitational weight.</text>
  <text x="500" y="615" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="14" fill="#334155">'الوزن الظاهري' مصطلح خاص بهذا المشروع — قراءة حقيقية لقوة الدعم، لا يساوي دائمًا الوزن الجذبي.</text>

  <!-- Caption 2: mass/weight distinction -->
  <text x="500" y="643" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-style="italic" fill="#334155">Mass measures inertia and does not depend on location; gravitational weight is a force that does.</text>
  <text x="500" y="663" text-anchor="middle" direction="rtl" font-family="'Segoe UI', 'Noto Sans Arabic', Tahoma, Arial, sans-serif" font-size="14" fill="#334155">تقيس الكتلة القصور الذاتي ولا تعتمد على الموقع؛ أما الوزن الجذبي فهو قوة تعتمد عليه.</text>

  <!-- Draft / review-required footer band -->
  <rect x="0" y="720" width="1000" height="40" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="745" text-anchor="middle" direction="ltr" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#b45309">DRAFT — REVIEW REQUIRED — ORIGINAL SCHEMATIC (ch01-t04-visual-001) — Not authorized for student-facing use</text>
</svg>
